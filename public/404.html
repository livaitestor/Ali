<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070b0f" />
    <meta name="robots" content="noindex" />
    <title>Page Not Found — Ali Haji Mazdarani</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, Manrope, "Segoe UI", sans-serif;
        color: #f3f8f8;
        background: #070b0f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        overflow: hidden;
        background:
          radial-gradient(circle at 76% 18%, rgba(0, 142, 143, 0.14), transparent 24rem),
          radial-gradient(circle at 12% 82%, rgba(0, 142, 143, 0.07), transparent 30rem),
          #070b0f;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        opacity: 0.045;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.24) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.24) 1px, transparent 1px);
        background-size: 72px 72px;
        mask-image: linear-gradient(to bottom, #000, transparent 88%);
      }

      .noise {
        position: fixed;
        inset: 0;
        z-index: 10;
        opacity: 0.025;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.8'/%3E%3C/svg%3E");
      }

      main {
        position: relative;
        z-index: 1;
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 32px 20px;
      }

      .frame {
        position: relative;
        width: min(100%, 880px);
        overflow: hidden;
        padding: clamp(32px, 7vw, 72px);
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 32px;
        background: linear-gradient(145deg, rgba(18, 27, 33, 0.82), rgba(8, 13, 17, 0.72));
        box-shadow:
          inset 0 1px rgba(255, 255, 255, 0.03),
          0 30px 100px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(20px);
      }

      .frame::after {
        content: "";
        position: absolute;
        top: -150px;
        right: -130px;
        width: 340px;
        height: 340px;
        border-radius: 50%;
        background: rgba(0, 142, 143, 0.11);
        filter: blur(70px);
      }

      .brand {
        position: absolute;
        top: 24px;
        left: 28px;
        display: flex;
        align-items: center;
        gap: 11px;
        color: rgba(255, 255, 255, 0.7);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }

      .brand-mark {
        display: grid;
        width: 34px;
        height: 34px;
        place-items: center;
        border: 1px solid rgba(0, 142, 143, 0.55);
        border-radius: 50%;
        color: #31b8b9;
        background: rgba(0, 142, 143, 0.1);
        font-size: 10px;
        letter-spacing: -0.03em;
      }

      .code-wrap {
        position: relative;
        display: inline-block;
        margin-top: 30px;
      }

      .code {
        margin: 0;
        font-size: clamp(7.5rem, 28vw, 15rem);
        font-weight: 800;
        line-height: 0.8;
        letter-spacing: -0.1em;
        color: transparent;
        background: linear-gradient(120deg, #fff 12%, #66898a 52%, #fff 88%);
        -webkit-background-clip: text;
        background-clip: text;
        filter: drop-shadow(0 0 30px rgba(0, 142, 143, 0.14));
      }

      .playhead {
        position: absolute;
        top: -12%;
        left: 52%;
        width: 1px;
        height: 128%;
        background: linear-gradient(transparent, #00a6a7 12%, #00a6a7 88%, transparent);
        box-shadow: 0 0 15px rgba(0, 142, 143, 0.8);
        animation: scan 4s ease-in-out infinite;
      }

      .playhead::before {
        content: "";
        position: absolute;
        top: 8%;
        left: -4px;
        width: 9px;
        height: 9px;
        border: 2px solid #00a6a7;
        border-radius: 50%;
        background: #070b0f;
      }

      @keyframes scan {
        0%,
        100% {
          transform: translateX(-80px);
          opacity: 0.35;
        }
        50% {
          transform: translateX(80px);
          opacity: 1;
        }
      }

      .eyebrow {
        margin: 30px 0 12px;
        color: #3ac2c3;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 5vw, 3.25rem);
        letter-spacing: -0.045em;
      }

      .copy {
        max-width: 520px;
        margin: 18px auto 0;
        color: rgba(255, 255, 255, 0.43);
        font-size: 15px;
        line-height: 1.8;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        margin-top: 34px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 23px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        color: rgba(255, 255, 255, 0.66);
        background: rgba(255, 255, 255, 0.025);
        font-size: 13px;
        font-weight: 600;
        text-decoration: none;
        transition: 220ms ease;
      }

      .button:hover {
        color: #fff;
        border-color: rgba(0, 142, 143, 0.55);
        transform: translateY(-2px);
      }

      .button.primary {
        color: #fff;
        border-color: #008e8f;
        background: #008e8f;
        box-shadow: 0 0 32px rgba(0, 142, 143, 0.25);
      }

      .button.primary:hover {
        background: #00a2a3;
      }

      .timecode {
        position: absolute;
        right: 28px;
        bottom: 24px;
        color: rgba(255, 255, 255, 0.18);
        font-family: "Courier New", monospace;
        font-size: 9px;
        letter-spacing: 0.1em;
      }

      @media (max-width: 560px) {
        .frame {
          padding: 80px 24px 58px;
          border-radius: 24px;
        }

        .brand {
          top: 22px;
          left: 22px;
        }

        .timecode {
          right: 22px;
          bottom: 18px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .playhead {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="noise"></div>
    <main>
      <section class="frame">
        <div class="brand">
          <span class="brand-mark">AM</span>
          Ali Mazdarani
        </div>

        <div class="code-wrap" aria-hidden="true">
          <p class="code">404</p>
          <span class="playhead"></span>
        </div>

        <p class="eyebrow">Scene not found</p>
        <h1>This frame did not make the final cut.</h1>
        <p class="copy">
          The page you are looking for may have moved, been renamed, or never existed.
          Let’s return to a scene we know.
        </p>

        <div class="actions">
          <a class="button primary" href="../">Back to portfolio</a>
          <button class="button" type="button" onclick="history.back()">Previous page</button>
        </div>

        <span class="timecode">00:04:04:00</span>
      </section>
    </main>
  </body>
</html>
