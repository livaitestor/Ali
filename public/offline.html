<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070b0f" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Site Under Maintenance — Ali Haji Mazdarani</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, Manrope, "Segoe UI", sans-serif;
        color: #f3f8f8;
        background: #070b0f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background:
          radial-gradient(circle at 50% 12%, rgba(0, 142, 143, 0.13), transparent 26rem),
          radial-gradient(circle at 4% 90%, rgba(19, 69, 86, 0.16), transparent 28rem),
          #070b0f;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        opacity: 0.045;
        pointer-events: none;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.25) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.25) 1px, transparent 1px);
        background-size: 68px 68px;
        mask-image: radial-gradient(circle at center, #000, transparent 82%);
      }

      main {
        position: relative;
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 32px 20px;
      }

      .panel {
        position: relative;
        width: min(100%, 760px);
        overflow: hidden;
        padding: clamp(34px, 8vw, 76px);
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 32px;
        background: linear-gradient(145deg, rgba(18, 27, 33, 0.84), rgba(8, 13, 17, 0.74));
        box-shadow:
          inset 0 1px rgba(255, 255, 255, 0.03),
          0 30px 100px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(20px);
      }

      .panel::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(115deg, transparent 25%, rgba(0, 142, 143, 0.045), transparent 75%);
        transform: translateX(-100%);
        animation: light-sweep 5s ease-in-out infinite;
      }

      @keyframes light-sweep {
        0%,
        35% {
          transform: translateX(-100%);
        }
        75%,
        100% {
          transform: translateX(100%);
        }
      }

      .logo {
        display: grid;
        width: 48px;
        height: 48px;
        margin: 0 auto;
        place-items: center;
        border: 1px solid rgba(0, 142, 143, 0.55);
        border-radius: 50%;
        color: #39c0c1;
        background: rgba(0, 142, 143, 0.1);
        box-shadow: 0 0 28px rgba(0, 142, 143, 0.14);
        font-size: 12px;
        font-weight: 800;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        margin-top: 30px;
        padding: 8px 13px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        color: rgba(255, 255, 255, 0.46);
        background: rgba(255, 255, 255, 0.025);
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .status-dot {
        position: relative;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #008e8f;
      }

      .status-dot::after {
        content: "";
        position: absolute;
        inset: -4px;
        border: 1px solid rgba(0, 142, 143, 0.5);
        border-radius: 50%;
        animation: pulse 1.8s ease-out infinite;
      }

      @keyframes pulse {
        from {
          opacity: 1;
          transform: scale(0.55);
        }
        to {
          opacity: 0;
          transform: scale(1.5);
        }
      }

      h1 {
        max-width: 620px;
        margin: 28px auto 0;
        font-size: clamp(2.4rem, 8vw, 5rem);
        line-height: 1.02;
        letter-spacing: -0.065em;
      }

      h1 span {
        color: #21b3b4;
        text-shadow: 0 0 28px rgba(0, 142, 143, 0.35);
      }

      .copy {
        max-width: 510px;
        margin: 23px auto 0;
        color: rgba(255, 255, 255, 0.43);
        font-size: 15px;
        line-height: 1.85;
      }

      .progress {
        width: min(100%, 420px);
        height: 3px;
        margin: 36px auto 0;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.07);
      }

      .progress-bar {
        width: 38%;
        height: 100%;
        border-radius: inherit;
        background: #008e8f;
        box-shadow: 0 0 14px rgba(0, 142, 143, 0.65);
        animation: render 2.8s ease-in-out infinite;
      }

      @keyframes render {
        0% {
          transform: translateX(-110%);
        }
        100% {
          transform: translateX(360%);
        }
      }

      .meta {
        display: flex;
        justify-content: center;
        gap: 32px;
        margin-top: 30px;
      }

      .meta-item {
        text-align: left;
      }

      .meta-label {
        display: block;
        color: rgba(255, 255, 255, 0.2);
        font-size: 8px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .meta-value {
        display: block;
        margin-top: 7px;
        color: rgba(255, 255, 255, 0.62);
        font-size: 12px;
      }

      .button {
        display: inline-flex;
        min-height: 48px;
        margin-top: 35px;
        padding: 0 24px;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(0, 142, 143, 0.5);
        border-radius: 999px;
        color: #6dd6d7;
        background: rgba(0, 142, 143, 0.09);
        font-size: 13px;
        font-weight: 600;
        text-decoration: none;
        transition: 220ms ease;
      }

      .button:hover {
        color: #fff;
        border-color: #008e8f;
        background: rgba(0, 142, 143, 0.17);
        transform: translateY(-2px);
      }

      footer {
        position: absolute;
        right: 0;
        bottom: 22px;
        left: 0;
        color: rgba(255, 255, 255, 0.18);
        font-size: 9px;
        letter-spacing: 0.16em;
        text-align: center;
        text-transform: uppercase;
      }

      @media (max-width: 560px) {
        main {
          padding-bottom: 70px;
        }

        .panel {
          padding: 44px 24px;
          border-radius: 24px;
        }

        .meta {
          gap: 22px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .panel::before,
        .status-dot::after,
        .progress-bar {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <div class="logo">AM</div>
        <div class="status">
          <span class="status-dot"></span>
          Timeline temporarily paused
        </div>

        <h1>A better cut is <span>rendering.</span></h1>
        <p class="copy">
          The portfolio is temporarily offline while improvements are being made.
          Please check back shortly—the next version is almost ready.
        </p>

        <div class="progress" aria-label="Maintenance in progress">
          <div class="progress-bar"></div>
        </div>

        <div class="meta">
          <div class="meta-item">
            <span class="meta-label">Status</span>
            <span class="meta-value">Maintenance</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Contact</span>
            <span class="meta-value">@AliHajiMazdarani</span>
          </div>
        </div>

        <a class="button" href="https://t.me/AliHajiMazdarani">Contact on Telegram</a>
      </section>

      <footer>Ali Haji Mazdarani · Senior Video Editor</footer>
    </main>
  </body>
</html>
